<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task 4 – JS Quiz App</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e1117;
      --surface: #161b27;
      --card: #1e2537;
      --border: #2a3248;
      --text: #e8eaf0;
      --muted: #6b7394;
      --blue: #4f8ef7;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --purple: #a855f7;
    }

    body {
      background: var(--bg);
      background-image: radial-gradient(ellipse at 20% 50%, rgba(79,142,247,0.06) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(168,85,247,0.06) 0%, transparent 60%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      padding: 2rem 1rem;
      color: var(--text);
    }

    .quiz-container {
      width: 100%;
      max-width: 640px;
    }

    /* ─── TITLE SCREEN ─── */
    .screen {
      display: none;
      animation: fadeUp 0.45s ease forwards;
    }

    .screen.active { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── HEADER BAR ─── */
    .quiz-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      padding: 1.25rem 1.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .quiz-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--blue);
    }

    .q-counter {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 600;
    }

    /* ─── PROGRESS BAR ─── */
    .progress-wrap {
      background: var(--border);
      height: 4px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--purple));
      transition: width 0.5s ease;
      border-radius: 0 2px 2px 0;
    }

    /* ─── CARD ─── */
    .quiz-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 16px 16px;
      padding: 2rem 1.75rem;
    }

    /* ─── TIMER ─── */
    .timer-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 1.25rem;
    }

    .timer {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.35rem 0.9rem;
      font-size: 0.88rem;
      font-weight: 800;
      color: var(--yellow);
      font-variant-numeric: tabular-nums;
    }

    .timer.urgent { color: var(--red); animation: pulse 0.5s infinite alternate; }

    @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }

    /* ─── QUESTION ─── */
    .question-num {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 0.6rem;
    }

    .question-text {
      font-size: 1.25rem;
      font-weight: 800;
      line-height: 1.4;
      margin-bottom: 1.75rem;
      color: var(--text);
    }

    /* ─── OPTIONS ─── */
    .options { display: flex; flex-direction: column; gap: 0.75rem; }

    .option {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 0.95rem 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.2s;
      user-select: none;
    }

    .option:hover:not(.locked) {
      border-color: var(--blue);
      background: rgba(79,142,247,0.08);
    }

    .option.selected {
      border-color: var(--blue);
      background: rgba(79,142,247,0.12);
    }

    .option.correct {
      border-color: var(--green);
      background: rgba(34,197,94,0.12);
      color: var(--green);
    }

    .option.wrong {
      border-color: var(--red);
      background: rgba(239,68,68,0.1);
      color: var(--red);
    }

    .option-label {
      width: 30px;
      height: 30px;
      min-width: 30px;
      border-radius: 8px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 800;
    }

    .option.selected .option-label { background: var(--blue); color: #fff; }
    .option.correct .option-label { background: var(--green); color: #fff; }
    .option.wrong .option-label { background: var(--red); color: #fff; }

    /* ─── ERROR ─── */
    .error-msg {
      color: var(--red);
      font-size: 0.82rem;
      font-weight: 700;
      margin-top: 0.75rem;
      display: none;
      animation: shake 0.35s ease;
    }

    .error-msg.show { display: block; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    /* ─── EXPLANATION ─── */
    .explanation {
      background: rgba(79,142,247,0.08);
      border: 1px solid rgba(79,142,247,0.2);
      border-radius: 10px;
      padding: 0.9rem 1.1rem;
      font-size: 0.85rem;
      color: #a0b4d4;
      margin-top: 1rem;
      display: none;
      line-height: 1.5;
    }

    .explanation.show { display: block; }
    .explanation strong { color: var(--blue); }

    /* ─── BUTTONS ─── */
    .btn-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    .btn {
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      font-weight: 800;
      padding: 0.8rem 2rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.04em;
    }

    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn.secondary {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--muted);
    }

    /* ─── START SCREEN ─── */
    .start-screen {
      text-align: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2rem;
    }

    .start-icon { font-size: 3.5rem; margin-bottom: 1rem; }

    .start-screen h1 {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .start-screen p { color: var(--muted); margin-bottom: 0.5rem; font-size: 0.95rem; }

    .quiz-meta {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin: 1.5rem 0 2rem;
      flex-wrap: wrap;
    }

    .meta-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.6rem 1.2rem;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--blue);
    }

    .meta-item span { color: var(--muted); font-weight: 400; display: block; font-size: 0.72rem; margin-bottom: 0.15rem; }

    /* ─── RESULT SCREEN ─── */
    .result-screen {
      text-align: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2rem;
    }

    .score-ring {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: conic-gradient(var(--blue) 0deg, var(--purple) var(--deg, 0deg), var(--border) var(--deg, 0deg));
      position: relative;
    }

    .score-ring::after {
      content: '';
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      background: var(--card);
    }

    .score-inner { position: relative; z-index: 1; }

    .score-number {
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: block;
      line-height: 1;
    }

    .score-denom { font-size: 0.75rem; color: var(--muted); font-weight: 600; }

    .result-screen h2 { font-size: 1.6rem; font-weight: 900; margin-bottom: 0.5rem; }

    .result-msg { color: var(--muted); margin-bottom: 2rem; }

    /* Summary */
    .summary { text-align: left; margin-bottom: 2rem; }

    .summary-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }

    .summary-item:last-child { border-bottom: none; }

    .s-q { flex: 1; color: var(--text); font-weight: 600; }
    .s-a { margin-left: 1rem; font-weight: 700; }
    .s-a.correct { color: var(--green); }
    .s-a.wrong { color: var(--red); }

    .result-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>

<div class="quiz-container">

  <!-- ═══ START SCREEN ═══ -->
  <div class="screen active" id="startScreen">
    <div class="start-screen">
      <div class="start-icon">🧠</div>
      <h1>Front-End Quiz</h1>
      <p>Test your knowledge of HTML, CSS, and JavaScript.</p>
      <p>Each question has a 20-second timer. Good luck!</p>
      <div class="quiz-meta">
        <div class="meta-item"><span>Questions</span>6</div>
        <div class="meta-item"><span>Timer</span>20s each</div>
        <div class="meta-item"><span>Topic</span>Frontend</div>
      </div>
      <button class="btn" onclick="startQuiz()">Start Quiz →</button>
    </div>
  </div>

  <!-- ═══ QUIZ SCREEN ═══ -->
  <div class="screen" id="quizScreen">
    <div class="quiz-header">
      <span class="quiz-title">⚡ Frontend Quiz</span>
      <span class="q-counter" id="qCounter">Question 1 of 6</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="quiz-card">
      <div class="timer-row">
        <div class="timer" id="timer">⏱ 20s</div>
      </div>
      <p class="question-num" id="questionNum">Question 01</p>
      <p class="question-text" id="questionText"></p>
      <div class="options" id="options"></div>
      <p class="error-msg" id="errorMsg">⚠ Please select an answer to continue.</p>
      <div class="explanation" id="explanation"></div>
      <div class="btn-row">
        <button class="btn" id="nextBtn" onclick="nextQuestion()">Next →</button>
      </div>
    </div>
  </div>

  <!-- ═══ RESULT SCREEN ═══ -->
  <div class="screen" id="resultScreen">
    <div class="result-screen">
      <div class="score-ring" id="scoreRing">
        <div class="score-inner">
          <span class="score-number" id="scoreNum">0</span>
          <span class="score-denom" id="scoreDenom">/6</span>
        </div>
      </div>
      <h2 id="resultTitle">Great Job!</h2>
      <p class="result-msg" id="resultMsg"></p>
      <div class="summary" id="summary"></div>
      <div class="result-btns">
        <button class="btn secondary" onclick="restartQuiz()">↩ Retry</button>
        <button class="btn" onclick="startQuiz()">New Attempt →</button>
      </div>
    </div>
  </div>

</div>

<script>
  const questions = [
    {
      q: "Which HTML tag is used to define the main navigation links of a page?",
      options: ["div", "menu", "nav", "section"],
      answer: 2,
      explanation: "The nav element is a semantic HTML5 tag specifically designed for groups of navigation links."
    },
    {
      q: "Which CSS property controls the space between the content and its border?",
      options: ["margin", "spacing", "padding", "gap"],
      answer: 2,
      explanation: "padding controls the space inside an element, between its content and border. margin controls space outside the border."
    },
    {
      q: "What does the 'C' stand for in CSS?",
      options: ["Cascading", "Creative", "Compiled", "Centralized"],
      answer: 0,
      explanation: "CSS stands for Cascading Style Sheets. 'Cascading' refers to how styles cascade from parent to child elements."
    },
    {
      q: "In JavaScript, which method adds an element to the END of an array?",
      options: ["unshift()", "push()", "append()", "insert()"],
      answer: 1,
      explanation: "push() adds one or more elements to the end of an array. unshift() adds to the beginning."
    },
    {
      q: "Which CSS layout module uses 'grid-template-columns' and 'grid-template-rows'?",
      options: ["Flexbox", "Float", "CSS Grid", "Multicolumn"],
      answer: 2,
      explanation: "CSS Grid Layout uses grid-template-columns and grid-template-rows to define the structure of a two-dimensional grid."
    },
    {
      q: "What is the correct way to select an element with id='header' in CSS?",
      options: [".header", "*header", "#header", "id=header"],
      answer: 2,
      explanation: "The # prefix is the ID selector in CSS. IDs are unique per page. Use . for class selectors."
    }
  ];

  let current = 0;
  let score = 0;
  let selected = null;
  let answered = false;
  let timerInterval = null;
  let timeLeft = 20;
  let userAnswers = [];

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function startQuiz() {
    current = 0;
    score = 0;
    selected = null;
    answered = false;
    userAnswers = [];
    showScreen('quizScreen');
    renderQuestion();
  }

  function renderQuestion() {
    const q = questions[current];
    selected = null;
    answered = false;
    timeLeft = 20;

    document.getElementById('questionNum').textContent = `Question ${String(current + 1).padStart(2,'0')}`;
    document.getElementById('questionText').textContent = q.q;
    document.getElementById('qCounter').textContent = `Question ${current + 1} of ${questions.length}`;
    document.getElementById('progressFill').style.width = `${(current / questions.length) * 100}%`;
    document.getElementById('errorMsg').classList.remove('show');
    document.getElementById('explanation').classList.remove('show');

    const labels = ['A','B','C','D'];
    const optionsEl = document.getElementById('options');
    optionsEl.innerHTML = '';
    q.options.forEach((opt, i) => {
      const div = document.createElement('div');
      div.className = 'option';
      div.innerHTML = `<span class="option-label">${labels[i]}</span>${opt}`;
      div.onclick = () => selectOption(i, div);
      optionsEl.appendChild(div);
    });

    startTimer();
  }

  function selectOption(index, el) {
    if (answered) return;
    document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    selected = index;
    document.getElementById('errorMsg').classList.remove('show');
  }

  function startTimer() {
    clearInterval(timerInterval);
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerDisplay();
      if (timeLeft <= 5) document.getElementById('timer').classList.add('urgent');
      else document.getElementById('timer').classList.remove('urgent');
      if (timeLeft <= 0) { clearInterval(timerInterval); autoAnswer(); }
    }, 1000);
  }

  function updateTimerDisplay() {
    document.getElementById('timer').textContent = `⏱ ${timeLeft}s`;
  }

  function autoAnswer() {
    if (!answered) {
      answered = true;
      revealAnswer();
    }
  }

  function nextQuestion() {
    if (!answered) {
      if (selected === null) {
        document.getElementById('errorMsg').classList.add('show');
        return;
      }
      answered = true;
      clearInterval(timerInterval);
      revealAnswer();
      return;
    }

    current++;
    if (current < questions.length) {
      renderQuestion();
    } else {
      showResult();
    }
    document.getElementById('nextBtn').textContent = 'Next →';
  }

  function revealAnswer() {
    const q = questions[current];
    const options = document.querySelectorAll('.option');

    userAnswers.push({ q: q.q, selected, correct: q.answer });

    options.forEach((opt, i) => {
      opt.classList.add('locked');
      if (i === q.answer) opt.classList.add('correct');
      else if (i === selected && i !== q.answer) opt.classList.add('wrong');
    });

    if (selected === q.answer) score++;

    const expEl = document.getElementById('explanation');
    expEl.innerHTML = `<strong>💡 Explanation:</strong> ${q.explanation}`;
    expEl.classList.add('show');

    document.getElementById('nextBtn').textContent =
      current < questions.length - 1 ? 'Next Question →' : 'See Results →';
  }

  function showResult() {
    showScreen('resultScreen');
    const pct = Math.round((score / questions.length) * 100);
    const deg = (pct / 100) * 360;
    document.getElementById('scoreRing').style.setProperty('--deg', deg + 'deg');
    document.getElementById('scoreNum').textContent = score;
    document.getElementById('scoreDenom').textContent = `/${questions.length}`;

    let title, msg;
    if (pct === 100)     { title = '🏆 Perfect Score!'; msg = 'Outstanding! You aced every question!'; }
    else if (pct >= 70)  { title = '🎉 Great Job!'; msg = 'Solid performance! Review the ones you missed.'; }
    else if (pct >= 50)  { title = '👍 Not Bad!'; msg = 'You\'re getting there. Keep practicing!'; }
    else                 { title = '📚 Keep Studying!'; msg = 'Review the fundamentals and try again.'; }

    document.getElementById('resultTitle').textContent = title;
    document.getElementById('resultMsg').textContent = msg;

    const summaryEl = document.getElementById('summary');
    summaryEl.innerHTML = userAnswers.map((a, i) => {
      const correct = a.selected === a.correct;
      const q = questions[i];
      return `<div class="summary-item">
        <span class="s-q">Q${i+1}. ${q.q.substring(0,40)}…</span>
        <span class="s-a ${correct ? 'correct' : 'wrong'}">${correct ? '✓ Correct' : '✗ Wrong'}</span>
      </div>`;
    }).join('');
  }

  function restartQuiz() {
    startQuiz();
  }
</script>
</body>
</html>
