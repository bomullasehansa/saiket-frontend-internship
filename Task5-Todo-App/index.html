<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task 5 – To-Do List App</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f7f4;
      --white: #ffffff;
      --ink: #18181b;
      --mid: #71717a;
      --border: #e4e4e7;
      --light: #f4f4f5;
      --accent: #6366f1;
      --accent-light: #eef2ff;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    /* ─── APP SHELL ─── */
    .app {
      max-width: 680px;
      margin: 0 auto;
    }

    /* ─── HERO HEADER ─── */
    .app-header {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      color: #fff;
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .app-header::after {
      content: '';
      position: absolute;
      right: -40px;
      bottom: -40px;
      width: 180px;
      height: 180px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }

    .app-header h1 {
      font-size: 1.9rem;
      font-weight: 800;
      margin-bottom: 0.35rem;
    }

    .app-header p { opacity: 0.8; font-size: 0.9rem; }

    .stats-chips {
      display: flex;
      gap: 0.6rem;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }

    .chip {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 0.3rem 0.85rem;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    /* ─── ADD TASK CARD ─── */
    .add-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.4rem;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow);
    }

    .add-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      background: var(--light);
      border: 2px solid transparent;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }

    .input-wrap input:focus {
      border-color: var(--accent);
      background: #fff;
    }

    .add-meta {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    select, .date-input {
      background: var(--light);
      border: 2px solid transparent;
      border-radius: 10px;
      padding: 0.6rem 0.9rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--mid);
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:focus, .date-input:focus { border-color: var(--accent); }

    .btn-add {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.75rem 1.4rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-add:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-add:active { transform: translateY(0); }

    /* ─── FILTER BAR ─── */
    .filter-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 0.4rem 1rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--mid);
      transition: all 0.2s;
    }

    .filter-btn.active, .filter-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .search-wrap {
      flex: 1;
      min-width: 160px;
    }

    .search-wrap input {
      width: 100%;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 0.4rem 1rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.82rem;
      color: var(--ink);
      outline: none;
    }

    /* ─── TASK LIST ─── */
    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 0.75rem;
      padding-left: 0.25rem;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }

    /* ─── TASK ITEM ─── */
    .task-item {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.1rem;
      display: flex;
      align-items: flex-start;
      gap: 0.85rem;
      transition: all 0.25s;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .task-item:hover { border-color: #c7d2fe; box-shadow: 0 2px 12px rgba(99,102,241,0.1); }

    .task-item.done { opacity: 0.65; border-color: var(--border); }

    /* Checkbox */
    .task-check {
      width: 22px;
      height: 22px;
      min-width: 22px;
      border-radius: 7px;
      border: 2px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      transition: all 0.2s;
      background: transparent;
    }

    .task-check:hover { border-color: var(--accent); }
    .task-check.checked { background: var(--green); border-color: var(--green); color: #fff; font-size: 0.8rem; }

    /* Body */
    .task-body { flex: 1; min-width: 0; }

    .task-text {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--ink);
      word-break: break-word;
      line-height: 1.4;
      margin-bottom: 0.35rem;
      transition: all 0.2s;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--mid);
    }

    .task-bottom {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .priority-badge {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.18rem 0.55rem;
      border-radius: 4px;
    }

    .p-high { background: #fef2f2; color: var(--red); }
    .p-medium { background: #fffbeb; color: var(--yellow); }
    .p-low { background: #f0fdf4; color: var(--green); }

    .task-date { font-size: 0.72rem; color: var(--mid); }

    /* Edit input */
    .task-edit-input {
      width: 100%;
      background: var(--light);
      border: 2px solid var(--accent);
      border-radius: 8px;
      padding: 0.45rem 0.7rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--ink);
      outline: none;
      margin-bottom: 0.35rem;
    }

    /* Actions */
    .task-actions {
      display: flex;
      gap: 0.35rem;
      align-items: center;
    }

    .action-btn {
      background: var(--light);
      border: none;
      border-radius: 8px;
      width: 32px;
      height: 32px;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s;
    }

    .action-btn:hover { transform: scale(1.12); }
    .action-btn.edit:hover { background: #eef2ff; }
    .action-btn.save:hover { background: #f0fdf4; }
    .action-btn.del:hover { background: #fef2f2; }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
      background: var(--white);
      border: 1.5px dashed var(--border);
      border-radius: 16px;
    }

    .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty-state p { color: var(--mid); font-size: 0.9rem; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 520px) {
      .add-row { flex-direction: column; }
      .add-meta { flex-direction: column; }
      .app-header { padding: 2rem 1.5rem; }
      .app-header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- ═══ HEADER ═══ -->
  <header class="app-header">
    <h1>✅ My Task Board</h1>
    <p>Stay organized, stay productive.</p>
    <div class="stats-chips">
      <div class="chip" id="statTotal">0 Total</div>
      <div class="chip" id="statDone">0 Done</div>
      <div class="chip" id="statLeft">0 Remaining</div>
    </div>
  </header>

  <!-- ═══ ADD TASK ═══ -->
  <div class="add-card">
    <div class="add-row">
      <div class="input-wrap">
        <input type="text" id="taskInput" placeholder="What needs to be done?" maxlength="120"
          onkeydown="if(event.key==='Enter') addTask()"/>
      </div>
      <button class="btn-add" onclick="addTask()">+ Add Task</button>
    </div>
    <div class="add-meta">
      <select id="prioritySelect">
        <option value="medium">🟡 Medium Priority</option>
        <option value="high">🔴 High Priority</option>
        <option value="low">🟢 Low Priority</option>
      </select>
      <input type="date" id="dueDateInput" class="date-input"/>
    </div>
  </div>

  <!-- ═══ FILTERS ═══ -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all" onclick="setFilter(this,'all')">All</button>
    <button class="filter-btn" data-filter="active" onclick="setFilter(this,'active')">Active</button>
    <button class="filter-btn" data-filter="done" onclick="setFilter(this,'done')">Completed</button>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="🔍 Search tasks..." oninput="renderTasks()"/>
    </div>
  </div>

  <!-- ═══ TASK LIST ═══ -->
  <p class="section-label" id="listLabel">All Tasks</p>
  <div class="task-list" id="taskList"></div>

</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('tasks_v1') || '[]');
  let filter = 'all';
  let editingId = null;

  function save() {
    localStorage.setItem('tasks_v1', JSON.stringify(tasks));
    renderTasks();
    updateStats();
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) {
      input.style.borderColor = '#ef4444';
      input.focus();
      setTimeout(() => input.style.borderColor = 'transparent', 1500);
      return;
    }
    tasks.unshift({
      id: Date.now(),
      text,
      done: false,
      priority: document.getElementById('prioritySelect').value,
      due: document.getElementById('dueDateInput').value,
      created: new Date().toLocaleDateString('en-GB', {day:'numeric', month:'short'})
    });
    input.value = '';
    document.getElementById('dueDateInput').value = '';
    save();
  }

  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
  }

  function startEdit(id) {
    editingId = id;
    renderTasks();
    const inp = document.getElementById(`edit-${id}`);
    if (inp) { inp.focus(); inp.select(); }
  }

  function saveEdit(id) {
    const inp = document.getElementById(`edit-${id}`);
    if (!inp) return;
    const val = inp.value.trim();
    if (!val) return;
    const t = tasks.find(t => t.id === id);
    if (t) t.text = val;
    editingId = null;
    save();
  }

  function setFilter(btn, f) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filter = f;
    const labels = { all: 'All Tasks', active: 'Active Tasks', done: 'Completed Tasks' };
    document.getElementById('listLabel').textContent = labels[f];
    renderTasks();
  }

  function renderTasks() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const filtered = tasks.filter(t => {
      const matchSearch = t.text.toLowerCase().includes(search);
      if (filter === 'active') return !t.done && matchSearch;
      if (filter === 'done')   return t.done && matchSearch;
      return matchSearch;
    });

    const list = document.getElementById('taskList');

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="icon">${filter==='done'?'🎉':'📋'}</div><p>${filter==='done'?'No completed tasks yet.':'No tasks found. Add one above!'}</p></div>`;
      return;
    }

    const prioOrder = { high: 0, medium: 1, low: 2 };
    const sorted = [...filtered].sort((a, b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      return prioOrder[a.priority] - prioOrder[b.priority];
    });

    const priorityLabel = { high: '🔴 High', medium: '🟡 Medium', low: '🟢 Low' };
    const priorityClass = { high: 'p-high', medium: 'p-medium', low: 'p-low' };

    list.innerHTML = sorted.map(t => {
      const isEditing = editingId === t.id;
      return `
        <div class="task-item ${t.done ? 'done' : ''}">
          <div class="task-check ${t.done ? 'checked' : ''}" onclick="toggleDone(${t.id})">
            ${t.done ? '✓' : ''}
          </div>
          <div class="task-body">
            ${isEditing
              ? `<input class="task-edit-input" id="edit-${t.id}" value="${t.text.replace(/"/g,'&quot;')}"
                  onkeydown="if(event.key==='Enter')saveEdit(${t.id});if(event.key==='Escape'){editingId=null;renderTasks();}"
                />`
              : `<p class="task-text">${t.text}</p>`
            }
            <div class="task-bottom">
              <span class="priority-badge ${priorityClass[t.priority]}">${priorityLabel[t.priority]}</span>
              ${t.due ? `<span class="task-date">📅 ${t.due}</span>` : ''}
              <span class="task-date">${t.created}</span>
            </div>
          </div>
          <div class="task-actions">
            ${isEditing
              ? `<button class="action-btn save" onclick="saveEdit(${t.id})" title="Save">💾</button>`
              : `<button class="action-btn edit" onclick="startEdit(${t.id})" title="Edit">✏️</button>`
            }
            <button class="action-btn del" onclick="deleteTask(${t.id})" title="Delete">🗑️</button>
          </div>
        </div>`;
    }).join('');
  }

  function updateStats() {
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    document.getElementById('statTotal').textContent = `${total} Total`;
    document.getElementById('statDone').textContent = `${done} Done`;
    document.getElementById('statLeft').textContent = `${total - done} Remaining`;
  }

  // Init
  renderTasks();
  updateStats();
</script>
</body>
</html>
